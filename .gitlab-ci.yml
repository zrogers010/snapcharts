image: node:20

stages:
  - verify

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

default:
  before_script:
    - npm ci --cache .npm --prefer-offline

audit:
  stage: verify
  script:
    - npm audit

unit_tests:
  stage: verify
  script:
    - npm run test:unit

typecheck:
  stage: verify
  script:
    - npm run typecheck

build_and_smoke:
  stage: verify
  script:
    - npm run build
    - npm run smoke:routes

